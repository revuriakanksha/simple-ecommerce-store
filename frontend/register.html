<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet"
          href="css/style.css">
</head>
<body>

<div class="form-container">

    <h2>Create Account</h2>

    <form id="registerForm">

        <input type="text"
               placeholder="Enter Name"
               required>

        <input type="email"
               placeholder="Enter Email"
               required>

        <input type="password"
               placeholder="Enter Password"
               required>

        <button class="btn"
                type="submit">

            Register

        </button>

    </form>

</div>

</body>
</html>
